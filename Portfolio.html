      <button class="mgm-lightbox-close" id="mgm-lightbox-close" aria-label="Close">&times;</button>

    <script>
    /* Portfolio gallery lightbox — bind every .mgm-portfolio-tile to the
       shared #mgm-lightbox overlay. Reads the tile's data-img + data-alt
       to populate image + caption. Esc and click-outside close. */
    (function () {
      var lb     = document.getElementById('mgm-lightbox');
      var lbImg  = document.getElementById('mgm-lightbox-img');
      var lbCap  = document.getElementById('mgm-lightbox-caption');
      var lbX    = document.getElementById('mgm-lightbox-close');
      if (!lb || !lbImg || !lbCap || !lbX) return;

      document.querySelectorAll('.mgm-portfolio-tile').forEach(function (tile) {
        tile.addEventListener('click', function () {
          var src = tile.dataset.img || '';
          var alt = tile.dataset.alt || '';
          lbImg.src = src;
          lbImg.alt = alt;
          lbCap.textContent = alt;
          lb.classList.add('is-open');
          document.body.style.overflow = 'hidden';
        });
      });

      function close() {
        lb.classList.remove('is-open');
        document.body.style.overflow = '';
        lbImg.src = '';
        lbImg.alt = '';
      }
      lbX.addEventListener('click', close);
      lb.addEventListener('click', function (e) { if (e.target === lb) close(); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && lb.classList.contains('is-open')) close();
      });
    })();
    </script>
