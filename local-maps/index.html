<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#297b6f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Local" />
  <title>Local</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Google Fonts: Alata + DM Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alata&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

  <!-- proj4.js -->
  <script src="https://unpkg.com/proj4@2.11.0/dist/proj4.js"></script>

  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div id="top-bar"></div>
    <div id="status-banner" hidden></div>
    <div id="north-arrow"></div>
    <div id="bottom-bar"></div>
    <div id="onboarding" style="display:none"></div>
    <div id="side-panel"></div>
    <div id="sheet-overlay"></div>
    <div id="offline-overlay"></div>
    <div id="perm-overlay"></div>
    <div id="install-overlay"></div>
    <div id="maps-overlay"></div>
  </div>

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/map.js"></script>
  <script type="module" src="js/gps.js"></script>
  <script type="module" src="js/compass.js"></script>
  <script type="module" src="js/offline.js"></script>
  <script type="module" src="js/ui.js"></script>
</body>
</html>
