        drawn++;
      }

      // labels: only at rest, gated by min_label, using curated lb text
      if (!moving && this.layers.labels) this.drawLabels(ctx, data, Z);

      ctx.restore();

      // rim (globe edge)
      ctx.beginPath(); path({ type: 'Sphere' });
      ctx.lineWidth = 1; ctx.strokeStyle = WATER; ctx.stroke();

      // report the tier actually rendered (falls back if a finer one failed to load)
      if (this.fpsEl) this.fpsTick(t0, (TIERS['10m'] === data ? '10m' : TIERS['50m'] === data ? '50m' : '110m'), drawn);
    },

    // ---- label geometry helpers (legibility) ---------------------------------
    // Even arc-length resample of a screen-space polyline at `step` px spacing.
    resample: function (pts, step) {
      if (pts.length < 2) return pts.slice();
      var out = [pts[0].slice()], prev = pts[0], carry = 0;
      for (var i = 1; i < pts.length; i++) {
        var a = prev, b = pts[i];
        var segLen = Math.hypot(b[0] - a[0], b[1] - a[1]);
        while (carry + segLen >= step) {
          var t = (step - carry) / segLen;
          var np = [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
          out.push(np);
          a = np; segLen = Math.hypot(b[0] - a[0], b[1] - a[1]); carry = 0;
        }
        carry += segLen; prev = b;
      }
      var last = pts[pts.length - 1], tail = out[out.length - 1];
      if (Math.hypot(last[0] - tail[0], last[1] - tail[1]) > step * 0.35) out.push(last.slice());
      return out;
    },

    // Moving-average smoothing that pins the endpoints.
    smooth: function (pts, passes) {
      var p = pts;
      for (var k = 0; k < passes; k++) {
        if (p.length < 3) break;
        var q = [p[0]];
        for (var i = 1; i < p.length - 1; i++) {
          q.push([(p[i - 1][0] + 2 * p[i][0] + p[i + 1][0]) / 4, (p[i - 1][1] + 2 * p[i][1] + p[i + 1][1]) / 4]);
        }
        q.push(p[p.length - 1]);
        p = q;
      }
      return p;
    },

    cumLen: function (pts) {
      var c = [0];
      for (var i = 1; i < pts.length; i++) c.push(c[i - 1] + Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]));
      return c;
    },

    // Sub-polyline of arc-length >= targetLen whose chord/arc ratio is highest
    // (the straightest stretch long enough to hold the label).
    straightWindow: function (pts, targetLen) {
      var n = pts.length, cum = this.cumLen(pts);
      if (cum[n - 1] <= targetLen) return pts;
      var best = null, bestScore = -Infinity, j = 1;
      for (var i = 0; i < n; i++) {
        if (j < i + 1) j = i + 1;
        while (j < n && cum[j] - cum[i] < targetLen) j++;
        if (j >= n) break;
        var arc = cum[j] - cum[i];
        var chord = Math.hypot(pts[j][0] - pts[i][0], pts[j][1] - pts[i][1]);
        var score = chord / arc;                 // 1 = perfectly straight
        if (score > bestScore) { bestScore = score; best = [i, j]; }
      }
      if (!best) return pts;
      return pts.slice(best[0], best[1] + 1);
    },

    // Offset a polyline by `dist` px along each vertex normal (centered differences).
    offsetPath: function (pts, dist) {
      var n = pts.length, out = [];
      for (var i = 0; i < n; i++) {
        var a = pts[Math.max(0, i - 1)], b = pts[Math.min(n - 1, i + 1)];
        var ang = Math.atan2(b[1] - a[1], b[0] - a[0]);
        out.push([pts[i][0] + Math.sin(ang) * dist, pts[i][1] - Math.cos(ang) * dist]);
      }
      return out;
    },

    // Arc-length sampler over a polyline: at(dd) -> [x, y, tangentAngle].
    sampler: function (pts) {
      var seg = [], total = 0;
      for (var i = 1; i < pts.length; i++) { var d = Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]); seg.push(d); total += d; }
      var at = function (dd) {
        var acc = 0;
        for (var i = 0; i < seg.length; i++) {
          if (acc + seg[i] >= dd) { var tt = (dd - acc) / (seg[i] || 1); return [pts[i][0] + (pts[i + 1][0] - pts[i][0]) * tt, pts[i][1] + (pts[i + 1][1] - pts[i][1]) * tt, Math.atan2(pts[i + 1][1] - pts[i][1], pts[i + 1][0] - pts[i][0])]; }
          acc += seg[i];
        }
        var L = pts.length - 1, pa = Math.max(0, L - 1);
        return [pts[L][0], pts[L][1], Math.atan2(pts[L][1] - pts[pa][1], pts[L][0] - pts[pa][0])];
      };
      return { at: at, total: total };
    },

    // Append " River" unless the name already reads as a river (any language).
    labelText: function (name) {
      var n = String(name).trim();
      if (/\b(river|rivière|riviere|fleuve)\b/i.test(n)) return n;
      if (/^(rio|río|wadi|nahr|sông|sungai)\b/i.test(n)) return n;
      return n + ' River';
    },

    drawLabels: function (ctx, data, Z) {
      var rot = this.proj.rotate();
      var center = [-rot[0], -rot[1]];
      var ink = WATER, paper = '#f0ece5';   // label halo
      ctx.font = "italic 500 10.5px 'Futura', 'Jost', 'Century Gothic', sans-serif";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.lineJoin = 'round';
      var placed = [], seen = {}, count = 0, examined = 0;
      var MAX = 130, EXMAX = 2600;
      var rivers = data.labelOrder;
      for (var idx = 0; idx < rivers.length && count < MAX && examined < EXMAX; idx++) {
        var f = rivers[idx];
        var p = f.properties;
        // labels are tier-driven like the river LINES now (no min_label gate) — every named
        // river in the tier is a candidate; importance order + space + collision decide which fit.
        var rawName = p.lb;
        if (!rawName || seen[rawName]) continue;
        examined++;
        var line = f._mainLine || (f._mainLine = this.mainLine(f));
        // longest contiguous front-hemisphere run
        var best = null, cur = [];
        for (var c = 0; c < line.length; c++) {
          if (d3.geoDistance(line[c], center) < 1.5) cur.push(line[c]);
          else { if (!best || cur.length > best.length) best = cur; cur = []; }
        }
        if (!best || cur.length > best.length) best = cur;
        if (!best || best.length < 2) continue;
        var pts = []; for (var q = 0; q < best.length; q++) { var pp = this.proj(best[q]); if (pp) pts.push(pp); }
        if (pts.length < 2) continue;
        // smooth the baseline: even resample, then pinned moving-average passes
        pts = this.resample(pts, 4);
        pts = this.smooth(pts, 18);
        if (pts.length < 2) continue;

        // measure the label (with a trailing " River")
        var label = this.labelText(rawName);
        var sp = 0.6, widths = [], textLen = 0;
        for (var ci = 0; ci < label.length; ci++) { var wch = ctx.measureText(label[ci]).width; widths.push(wch); textLen += wch + sp; }
        textLen -= sp;
        if (textLen < 6) continue;

        // place the text only on the straightest stretch long enough to hold it,
        // so glyphs don't crash into each other on river bends
        var base = this.straightWindow(pts, textLen * 1.2 + 10);
        if (base.length < 2) continue;
        if (base[base.length - 1][0] < base[0][0]) base = base.slice().reverse();

        // pick the offset side from the window's mid tangent (toward globe-up)
        var bs = this.sampler(base);
        if (bs.total < textLen * 1.02 || bs.total < 24) continue;
        var mt = bs.at(bs.total / 2);
        var side = -Math.cos(mt[2]) <= 0 ? 1 : -1;
        var OFFSET = 13;

        // glyphs ride the OFFSET curve, spaced along ITS arc length
        var off = this.offsetPath(base, OFFSET * side);
        var os = this.sampler(off);
        var at = os.at, total = os.total;
        if (total < textLen * 1.02) continue;

        // pre-place glyphs; reject the label if the path bends more than MAXBEND between
        // any two consecutive letters, so labels only sit on smooth-enough stretches
        var MAXBEND = 0.3, dd2 = (total - textLen) / 2, gpos = [], prevAng = null, okBend = true;
        for (var gi = 0; gi < label.length; gi++) {
          var wc = widths[gi], pa = at(dd2 + wc / 2), ang = pa[2];
          if (ang > 1.45) ang = 1.45; else if (ang < -1.45) ang = -1.45;   // no upside-down glyphs
          if (prevAng !== null) { var dA = Math.abs(ang - prevAng); if (dA > Math.PI) dA = 2 * Math.PI - dA; if (dA > MAXBEND) { okBend = false; break; } }
          prevAng = ang; gpos.push([pa[0], pa[1], ang]); dd2 += wc + sp;
        }
        if (!okBend) continue;

        // overlap test: sample each label by its glyph centers; reject if any glyph lands
        // within CLASH px of a glyph already placed (prevents labels crossing/overlapping)
        var CLASH = 9, clash = false;
        for (var pl = 0; pl < placed.length && !clash; pl++) {
          for (var gj = 0; gj < gpos.length; gj++) { var ex = placed[pl][0] - gpos[gj][0], ey = placed[pl][1] - gpos[gj][1]; if (ex * ex + ey * ey < CLASH * CLASH) { clash = true; break; } }
        }
        if (clash) continue;

        seen[rawName] = 1; count++;
        for (var gk = 0; gk < gpos.length; gk++) placed.push(gpos[gk]);   // remember glyph centers

        for (var gd = 0; gd < gpos.length; gd++) {
          var g = gpos[gd];
          ctx.save(); ctx.translate(g[0], g[1]); ctx.rotate(g[2]);
          ctx.lineWidth = 3.6; ctx.strokeStyle = paper; ctx.globalAlpha = 1; ctx.strokeText(label[gd], 0, 0);
          ctx.fillStyle = ink; ctx.fillText(label[gd], 0, 0);
          ctx.restore();
        }
      }
    }
  };

  function start() {
    if (!window.d3 || !window.topojson) { setTimeout(start, 30); return; }
    Globe.init();
  }
  start();
})();
</script>
